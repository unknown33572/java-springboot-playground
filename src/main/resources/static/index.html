<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyword Monitor</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <span class="nav-icon">&#9672;</span>
            Keyword Monitor
        </div>
        <div class="nav-links">
            <a href="#dashboard" class="nav-link active" data-page="dashboard">Dashboard</a>
            <a href="#sites" class="nav-link" data-page="sites">Sites</a>
        </div>
    </nav>

    <main id="app" class="container">
        <!-- Content rendered by JS -->
    </main>

    <!-- Site Modal -->
    <div id="siteModal" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Add Site</h3>
                <button class="modal-close" onclick="closeSiteModal()">&times;</button>
            </div>
            <form id="siteForm" onsubmit="handleSiteSubmit(event)">
                <input type="hidden" id="siteId">
                <div class="form-group">
                    <label for="siteName">Name</label>
                    <input type="text" id="siteName" required placeholder="e.g. Naver Blog">
                </div>
                <div class="form-group">
                    <label for="siteUrl">URL</label>
                    <input type="url" id="siteUrl" required placeholder="https://example.com">
                </div>
                <div class="form-group">
                    <label for="siteDesc">Description</label>
                    <textarea id="siteDesc" rows="3" placeholder="Site description..."></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeSiteModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/charts.js"></script>
    <script src="/js/dashboard.js"></script>
    <script src="/js/sites.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
